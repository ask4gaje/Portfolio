name: CI/CD
on:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ska-HP
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        run: |
          npm config set prefix "$HOME/.npm-global"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          npm install -g pnpm@11.6.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm audit --audit-level=high
      - run: pnpm tsc --noEmit
      - run: pnpm build
  deploy:
    runs-on: ska-HP
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Docker Compose
        run: |
          docker compose build
          docker compose up -d --remove-orphans

          echo "Waiting for app to become healthy (up to 60s)..."
          TIMEOUT=60
          ELAPSED=0
          until [ "$(docker inspect portfolio-app-1 --format='{{.State.Health.Status}}' 2>/dev/null)" = "healthy" ] || [ "$ELAPSED" -ge "$TIMEOUT" ]; do
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          STATUS=$(docker inspect portfolio-app-1 --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
          if [ "$STATUS" = "healthy" ]; then
            echo "App is healthy!"
          else
            echo "App status: $STATUS - verify with: docker compose ps"
          fi

          echo "Pruning dangling images..."
          docker image prune -f
