name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Server
    needs: ci
    if: "!contains(github.event.head_commit.message, '#no-deploy')"
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Run Deploy Script
        run: /home/ska/Projects/Web/Portfolio/deploy.sh
